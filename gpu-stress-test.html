<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GPU 压力测试</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f9fc;
      --surface: #ffffff;
      --surface-soft: #fbfcff;
      --surface-tint: #f6fbff;
      --line: #dbe5f2;
      --line-strong: #c8d8eb;
      --text: #1f2a37;
      --muted: #667085;
      --accent-cyan: #c7f0f2;
      --accent-purple: #e4d8ff;
      --accent-pink: #ffd9e8;
      --accent-ink: #4b5563;
      --shadow: 0 16px 40px rgba(31, 42, 55, 0.08);
      --shadow-soft: 0 8px 24px rgba(31, 42, 55, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei UI", system-ui, sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      isolation: isolate;
    }

    #app::before,
    #app::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      z-index: 0;
      filter: blur(8px);
      opacity: 0.9;
    }

    #app::before {
      width: 240px;
      height: 240px;
      left: -60px;
      top: 22px;
      background: var(--accent-cyan);
    }

    #app::after {
      width: 320px;
      height: 320px;
      right: -80px;
      bottom: 28px;
      background: var(--accent-purple);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: auto;
      cursor: crosshair;
      position: relative;
      z-index: 1;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 18px;
      gap: 16px;
      z-index: 2;
    }

    .topbar,
    .panel {
      pointer-events: auto;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 18px;
    }

    .topbar {
      padding: 16px 18px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      box-shadow: var(--shadow-soft);
    }

    .brand {
      display: grid;
      gap: 2px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(16px, 1.7vw, 21px);
      letter-spacing: 0.015em;
      color: var(--accent-ink);
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      max-width: 64ch;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
    }

    button,
    select,
    input[type="range"] {
      font: inherit;
    }

    button,
    select {
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: var(--surface-soft);
      color: var(--text);
      padding: 9px 12px;
      min-height: 38px;
      outline: none;
      white-space: nowrap;
    }

    button {
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: #a8d8dc;
      box-shadow: var(--shadow-soft);
    }

    button.primary {
      background: var(--accent-cyan);
      border-color: #a6dfe5;
    }

    button.danger {
      background: var(--accent-pink);
      border-color: #f0b8cf;
    }

    .grid {
      width: min(100%, 860px);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .panel {
      padding: 12px;
      box-shadow: var(--shadow-soft);
    }

    .field {
      display: grid;
      gap: 4px;
    }

    .field label {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.1;
    }

    .field strong {
      color: var(--accent-ink);
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #9edee4;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    .stat {
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      min-height: 60px;
      display: grid;
      align-content: start;
      gap: 4px;
    }

    .stat .k {
      display: block;
      font-size: 10px;
      color: var(--muted);
      line-height: 1.05;
    }

    .stat .v {
      font-size: clamp(15px, 1.5vw, 20px);
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: var(--accent-ink);
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .footer {
      pointer-events: auto;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 6px;
      flex-wrap: wrap;
    }

    .hint {
      max-width: 72ch;
      font-size: 11px;
      line-height: 1.25;
      color: var(--muted);
      background: var(--surface-soft);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
    }

    .status {
      min-width: 0;
      width: 100%;
      text-align: left;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid #d7dff0;
      background: var(--surface-tint);
    }

    .status .label {
      display: block;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 1px;
      line-height: 1.05;
    }

    .status .value {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent-ink);
      line-height: 1.05;
    }

    @media (max-width: 860px) {
      .footer {
        align-items: stretch;
      }

      .status {
        text-align: left;
      }
    }

    @media (max-width: 560px) {
      .overlay {
        padding: 12px;
      }

      .topbar {
        padding: 14px;
      }
    }

    .shell {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(440px, 520px) minmax(0, 1fr);
      gap: 14px;
      height: 100%;
      padding: 16px;
    }

    .sidebar {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
      padding-right: 2px;
    }

    .brand-card {
      padding: 14px;
    }

    .card {
      pointer-events: auto;
      position: relative;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow-soft);
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .brand-card::before,
    .action-card::before,
    .preset-card::before,
    .controls-card::before,
    .metrics-card::before,
    .stage-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      border-radius: inherit;
      opacity: 0.95;
    }

    .brand-card::before {
      background: var(--accent-cyan);
    }

    .action-card::before,
    .metrics-card::before {
      background: var(--accent-pink);
    }

    .preset-card::before,
    .stage-card::before {
      background: var(--accent-purple);
    }

    .controls-card::before {
      background: var(--accent-cyan);
    }

    .action-card {
      padding: 10px;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    .language-field {
      display: grid;
      gap: 4px;
    }

    .language-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-ink);
      line-height: 1;
    }

    .action-row > * {
      width: 100%;
      min-width: 0;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      min-width: 0;
    }

    .section-title {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-ink);
    }

    .section-subtitle {
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .controls-grid {
      width: 100%;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .field label {
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
    }

    .field label span {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .field label strong {
      white-space: nowrap;
    }

    .stage {
      min-height: 0;
      display: flex;
    }

    .stage-card {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }

    .stage-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .stage-title {
      margin-top: 4px;
      font-size: 19px;
      font-weight: 700;
      color: var(--accent-ink);
      letter-spacing: 0.01em;
    }

    .stage-badges {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--accent-ink);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    #stageModeText {
      background: var(--accent-cyan);
      border-color: #b9e6eb;
    }

    #stageLangText {
      background: var(--accent-purple);
      border-color: #d8caf4;
    }

    .canvas-frame {
      flex: 1;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #ffffff;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    canvas {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: auto;
      cursor: crosshair;
      background: #ffffff;
    }

    .stage-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      flex-wrap: wrap;
    }

    .stage-note {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .status {
      margin-top: auto;
    }

    .button-inline {
      min-width: 0;
    }

    @media (max-width: 1100px) {
      .shell {
        grid-template-columns: minmax(400px, 460px) minmax(0, 1fr);
      }
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      #app {
        min-height: 100%;
        overflow: auto;
      }

      .shell {
        height: auto;
        min-height: 100%;
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(520px, 1fr);
      }

      .sidebar {
        max-height: 46vh;
      }

      .stage-card {
        min-height: 520px;
      }

      .action-row {
        grid-template-columns: 1fr;
      }
    }

    ::selection {
      background: var(--accent-purple);
      color: var(--text);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="shell">
      <aside class="sidebar">
        <div class="brand brand-card">
          <div class="eyebrow" id="pageEyebrow">GPU Control Room</div>
          <h1 id="pageTitle">GPU 压力测试</h1>
          <p id="pageSubtitle">通过高分辨率全屏渲染和高复杂度片元着色器持续压榨 GPU。建议先从低档开始，再逐步提高负载。</p>
        </div>

        <div class="card action-card">
          <div class="action-row">
            <div class="language-field">
              <span class="language-label">Language</span>
              <select id="languageSelect" aria-label="Language">
              <option value="zh-CN">简体中文</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              </select>
            </div>
            <button id="toggleBtn" class="primary">开始测试</button>
          </div>
        </div>

        <div class="card preset-card">
          <div class="section-head">
            <span class="section-title" id="presetLabelText">预设</span>
            <span class="section-subtitle" id="presetHintText">快速切换负载</span>
          </div>
          <select id="preset">
            <option value="safe" selected>安全</option>
            <option value="medium">中等</option>
            <option value="extreme">极限</option>
            <option value="ultra">超压</option>
          </select>
        </div>

        <div class="card controls-card">
          <div class="section-head">
            <span class="section-title" id="controlsLabelText">控制项</span>
            <span class="section-subtitle" id="controlsHintText">逐项调节负载</span>
          </div>
          <div class="grid controls-grid">
            <div class="field">
              <label><span id="resolutionLabelText">渲染分辨率倍率</span><strong id="resLabel">1.00x</strong></label>
              <input id="resolution" type="range" min="0.5" max="2" step="0.05" value="0.8" />
            </div>
            <div class="field">
              <label><span id="complexityLabelText">着色器复杂度</span><strong id="complexityLabel">64 次</strong></label>
              <input id="complexity" type="range" min="32" max="256" step="1" value="64" />
            </div>
            <div class="field">
              <label><span id="passesLabelText">每帧绘制次数</span><strong id="passesLabel">1 次</strong></label>
              <input id="passes" type="range" min="1" max="8" step="1" value="1" />
            </div>
            <div class="field">
              <label><span id="enginesLabelText">并发引擎</span><strong id="engineCountLabel">1 个</strong></label>
              <input id="engines" type="range" min="1" max="2" step="1" value="1" />
            </div>
            <div class="field">
              <label><span id="speedLabelText">动画速度</span><strong id="speedLabel">0.90x</strong></label>
              <input id="speed" type="range" min="0.2" max="2" step="0.05" value="0.9" />
            </div>
          </div>
        </div>

        <div class="card metrics-card">
          <div class="section-head">
            <span class="section-title" id="metricsLabelText">指标</span>
            <span class="section-subtitle" id="metricsHintText">实时反馈</span>
          </div>
          <div class="stats">
            <div class="stat"><span class="k" id="fpsLabelText">FPS</span><span class="v" id="fps">0</span></div>
            <div class="stat"><span class="k" id="frameMsLabelText">帧耗时</span><span class="v" id="frameMs">0.0 ms</span></div>
            <div class="stat"><span class="k" id="internalSizeLabelText">内部分辨率</span><span class="v" id="internalSize">0 × 0</span></div>
            <div class="stat"><span class="k" id="renderStateLabelText">测试状态</span><span class="v" id="renderState">待机</span></div>
          </div>
        </div>

      </aside>

      <main class="stage">
        <section class="stage-card">
          <div class="stage-head">
            <div>
              <div class="eyebrow" id="stageEyebrow">Live Render</div>
              <div class="stage-title" id="stageTitleText">主测试窗口</div>
            </div>
            <div class="stage-badges">
              <span class="badge" id="stageModeText">Three.js</span>
              <span class="badge" id="stageLangText">ZH</span>
            </div>
          </div>
          <div class="canvas-frame">
            <canvas id="gl"></canvas>
          </div>
          <div class="stage-foot">
            <div class="stage-note" id="stageNoteText">Use the left panel to tune load.</div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="./three.min.js"></script>
  <script>
    (() => {

      const preset = document.getElementById('preset');
      const langSelect = document.getElementById('languageSelect');

          },

          root.rotation.z = Math.sin(t * 0.34) * 0.05;
          core.rotation.x = t * 0.48;
          core.rotation.y = -t * 0.36;
          shell.rotation.x = -t * 0.21;
          shell.rotation.z = t * 0.27;
          frame.rotation.x = 0.12 + Math.sin(t * 0.26) * 0.03;
          frame.rotation.y = t * 0.12;
          innerRing.rotation.x = Math.PI * 0.5 + Math.sin(t * 0.5) * 0.08;
          innerRing.rotation.y = t * 0.38;
          outerRing.rotation.y = Math.PI * 0.5 + t * 0.44;
          outerRing.rotation.z = Math.sin(t * 0.22) * 0.07;
          sideRing.rotation.x = t * 0.31;
          sideRing.rotation.y = Math.PI * 0.25 + Math.sin(t * 0.28) * 0.09;
          accent.rotation.set(t * 0.25, t * 0.34, t * 0.12);

            }
          } else {

          resize,
          render,
          dispose

      const sceneFsSource = `
        precision highp float;
        varying vec2 vUv;
        uniform vec2 uResolution;
        uniform float uTime;
        uniform float uPass;
        uniform int uComplexity;
        uniform float uSpeed;
        uniform float uSeed;
        uniform sampler2D uPrev;

        float hash(vec2 p) {
          p = fract(p * vec2(123.34, 456.21));
          p += dot(p, p + 78.233);
          return fract(p.x * p.y);
        }

        vec2 hash2(vec2 p) {
          float n = hash(p);
          return vec2(n, hash(p + n + 19.19));
        }

        mat2 rot(float a) {
          float s = sin(a);
          float c = cos(a);
          return mat2(c, -s, s, c);
        }

        vec3 palette(float t) {
          vec3 a = vec3(0.98, 0.99, 1.00);
          vec3 b = vec3(0.14, 0.10, 0.16);
          vec3 c = vec3(0.22, 0.18, 0.24);
          vec3 d = vec3(0.10, 0.08, 0.14);
          return a - b * cos(6.28318 * (c * t + d));
        }

        void main() {
          vec2 uv = vUv * 2.0 - 1.0;
          uv.x *= uResolution.x / max(uResolution.y, 1.0);

          float t = uTime * 0.001 * uSpeed;
          vec2 p = uv;
          vec2 flow = vec2(0.0);
          vec3 col = vec3(0.985, 0.99, 1.0);
          float glowSum = 0.0;
          float ribbonSum = 0.0;
          float nodeSum = 0.0;

          vec2 orbitA = vec2(sin(t * 0.82 + uSeed), cos(t * 0.74 + 0.4 + uSeed)) * 0.46;
          vec2 orbitB = vec2(sin(t * 0.56 + 1.7 + uSeed), cos(t * 0.63 + 0.9)) * 0.34;
          vec2 orbitC = vec2(sin(t * 0.95 + 2.2), cos(t * 0.88 + 1.1 + uSeed)) * 0.24;

          for (int i = 0; i < 384; i++) {
            if (i >= uComplexity) break;
            float fi = float(i);
            float a = t * 0.42 + fi * 0.071 + uPass * 0.19 + uSeed * 0.7;
            vec2 orbit = vec2(
              sin(a * 1.31 + sin(a * 0.41)) * 0.58,
              cos(a * 1.17 + cos(a * 0.37)) * 0.38
            );
            vec2 drift = vec2(
              sin(a * 0.77 + fi * 0.03 + t),
              cos(a * 0.91 - fi * 0.025 - t * 0.7)
            ) * 0.06;
            vec2 center = orbit + drift;
            float radius = 0.14 + 0.03 * sin(a * 2.0);
            float d = length(p - center);
            float glow = exp(-d * d * (18.0 + 4.0 * sin(fi * 0.17 + t)));
            float ring = exp(-abs(d - radius) * (22.0 + 3.0 * cos(fi * 0.11 + t)));
            float ribbon = exp(-abs((p.y - center.y) - sin(p.x * 2.8 + a) * 0.12) * 24.0);
            float node = exp(-d * d * 240.0) * (0.6 + 0.4 * smoothstep(0.10, 0.22, radius));
            vec3 tint = palette(fract(fi * 0.027 + uSeed * 0.13 + 0.08 * sin(t * 0.2)));

            glowSum += glow;
            ribbonSum += ring + ribbon * 0.35;
            nodeSum += node;
            col += tint * (glow * 0.018 + ring * 0.012 + ribbon * 0.004);

            vec2 swirl = rot(0.004 * sin(a) + 0.002 * cos(fi * 0.3)) * p;
            p = mix(p, swirl, 0.06);
            flow += vec2(sin(a + p.y), cos(a - p.x)) * 0.0015;

            if (mod(fi + uPass, 7.0) < 0.45) {
              vec2 duv = clamp(vUv + flow * 0.01 + hash2(center * 3.0) * 0.002, 0.001, 0.999);
              col += texture2D(uPrev, duv).rgb * 0.02;
            }

            if (mod(fi, 11.0) < 0.5) {
              vec2 duv2 = clamp(vUv + vec2(flow.y, -flow.x) * 0.014, 0.001, 0.999);
              col += texture2D(uPrev, duv2).rgb * 0.012;
            }
          }

          float radial = exp(-dot(uv, uv) * 0.62);
          float haloA = exp(-abs(length(uv - orbitA) - 0.28) * 16.0);
          float haloB = exp(-abs(length(uv - orbitB) - 0.20) * 18.0);
          float haloC = exp(-abs(length(uv - orbitC) - 0.15) * 20.0);
          float lattice = pow(0.5 + 0.5 * sin((uv.x * 1.8 + uv.y * 1.2 + t * 0.4) * 4.5), 8.0);
          float ripple = pow(0.5 + 0.5 * sin((length(uv) * 7.0 - t * 2.4)), 6.0);

          vec3 prev = texture2D(uPrev, clamp(vUv, 0.001, 0.999)).rgb;
          col += vec3(0.05, 0.07, 0.08) * radial;
          col += vec3(0.18, 0.12, 0.22) * haloA * 0.28;
          col += vec3(0.12, 0.18, 0.20) * haloB * 0.22;
          col += vec3(0.20, 0.11, 0.15) * haloC * 0.18;
          col += vec3(0.10, 0.11, 0.13) * lattice * 0.08;
          col += vec3(0.10, 0.09, 0.14) * ripple * 0.07;
          col += vec3(0.18, 0.20, 0.22) * glowSum * 0.003;
          col += vec3(0.14, 0.12, 0.17) * ribbonSum * 0.0025;
          col += vec3(0.08, 0.06, 0.08) * nodeSum * 0.004;
          col = mix(col, prev, 0.14);
          col *= 1.0 - smoothstep(0.18, 1.55, length(uv));
          col += hash(gl_FragCoord.xy + t + uSeed) * 0.008;
          gl_FragColor = vec4(pow(max(col, 0.0), vec3(0.98)), 1.0);
        }
      `;

        precision highp float;
        varying vec2 vUv;
        uniform sampler2D uTexture;
        uniform vec2 uResolution;
        uniform float uTime;

        vec3 tap(vec2 uv) {

          vec2 drift = vec2(sin(uTime * 0.0005), cos(uTime * 0.0007)) * px * 0.9;
          vec3 c = vec3(0.0);
          c += tap(vUv) * 0.30;
          c += tap(vUv + px * vec2(1.0, 0.0)) * 0.11;
          c += tap(vUv + px * vec2(-1.0, 0.0)) * 0.11;
          c += tap(vUv + px * vec2(0.0, 1.0)) * 0.11;
          c += tap(vUv + px * vec2(0.0, -1.0)) * 0.11;
          c += tap(vUv + drift) * 0.10;
          c += tap(vUv - drift) * 0.10;
          c += tap(vUv + px * vec2(2.0, 1.0)) * 0.05;
          c += tap(vUv + px * vec2(-2.0, -1.0)) * 0.05;
          c += tap(vUv + px * vec2(1.0, 2.0)) * 0.05;
          c += tap(vUv + px * vec2(-1.0, -2.0)) * 0.05;
          c += tap(vUv + px * vec2(3.0, -2.0)) * 0.03;
          c += tap(vUv + px * vec2(-3.0, 2.0)) * 0.03;
          float vignette = 1.0 - smoothstep(0.14, 1.45, length(vUv * 2.0 - 1.0));
          c = mix(c, vec3(0.99, 0.995, 1.0), 0.10);
          c = pow(max(c, 0.0), vec3(0.985));

      function clamp(value, min, max) {

      function compileShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          const info = gl.getShaderInfoLog(shader);
          gl.deleteShader(shader);
          throw new Error(info || 'Shader compile failed');
        }
        return shader;
      }

      function createProgram(gl, vs, fs) {
        const program = gl.createProgram();
        gl.attachShader(program, compileShader(gl, gl.VERTEX_SHADER, vs));
        gl.attachShader(program, compileShader(gl, gl.FRAGMENT_SHADER, fs));
        gl.linkProgram(program);
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
          const info = gl.getProgramInfoLog(program);
          gl.deleteProgram(program);
          throw new Error(info || 'Program link failed');
        }
        return program;
      }

      function makeHiddenCanvas() {

      function createEngine(engineCanvas, engineIndex) {
        const gl = engineCanvas.getContext('webgl', {
          alpha: false,
          antialias: false,
          depth: false,
          stencil: false,
          preserveDrawingBuffer: false,
          premultipliedAlpha: false,
          powerPreference: 'high-performance'
        });

        if (!gl) {
          return null;
        }

        const sceneProgram = createProgram(gl, vsSource, sceneFsSource);
        const presentProgram = createProgram(gl, vsSource, presentFsSource);

        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
          -1, -1,
           3, -1,
          -1,  3
        ]), gl.STATIC_DRAW);

        gl.disable(gl.DEPTH_TEST);
        gl.disable(gl.BLEND);

        const scenePosLoc = gl.getAttribLocation(sceneProgram, 'aPosition');
        const presentPosLoc = gl.getAttribLocation(presentProgram, 'aPosition');
        gl.useProgram(sceneProgram);
        gl.enableVertexAttribArray(scenePosLoc);
        gl.vertexAttribPointer(scenePosLoc, 2, gl.FLOAT, false, 0, 0);
        gl.useProgram(presentProgram);
        gl.enableVertexAttribArray(presentPosLoc);
        gl.vertexAttribPointer(presentPosLoc, 2, gl.FLOAT, false, 0, 0);

        const sceneUni = {
          resolution: gl.getUniformLocation(sceneProgram, 'uResolution'),
          time: gl.getUniformLocation(sceneProgram, 'uTime'),
          pass: gl.getUniformLocation(sceneProgram, 'uPass'),
          complexity: gl.getUniformLocation(sceneProgram, 'uComplexity'),
          speed: gl.getUniformLocation(sceneProgram, 'uSpeed'),
          seed: gl.getUniformLocation(sceneProgram, 'uSeed'),
          prev: gl.getUniformLocation(sceneProgram, 'uPrev')
        };

        const presentUni = {
          texture: gl.getUniformLocation(presentProgram, 'uTexture'),
          resolution: gl.getUniformLocation(presentProgram, 'uResolution'),
          time: gl.getUniformLocation(presentProgram, 'uTime')
        };

        const local = {
          index: engineIndex,
          gl,
          canvas: engineCanvas,
          sceneProgram,
          presentProgram,
          sceneUni,
          presentUni,
          targetWidth: 0,
          targetHeight: 0,
          targets: [],
          seed: 0.73 + engineIndex * 1.91
        };

        function createTarget(width, height) {
          const texture = gl.createTexture();
          gl.bindTexture(gl.TEXTURE_2D, texture);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, width, height, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);

          const framebuffer = gl.createFramebuffer();
          gl.bindFramebuffer(gl.FRAMEBUFFER, framebuffer);
          gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0);

          if (gl.checkFramebufferStatus(gl.FRAMEBUFFER) !== gl.FRAMEBUFFER_COMPLETE) {
            gl.deleteFramebuffer(framebuffer);
            gl.deleteTexture(texture);
            throw new Error('Framebuffer incomplete');
          }

          return { texture, framebuffer, width, height };
        }

        function destroyTarget(target) {
          if (!target) {
            return;
          }
          gl.deleteFramebuffer(target.framebuffer);
          gl.deleteTexture(target.texture);
        }

        function clearTarget(target) {
          gl.bindFramebuffer(gl.FRAMEBUFFER, target.framebuffer);
          gl.viewport(0, 0, target.width, target.height);
          gl.clearColor(0.0, 0.0, 0.0, 1.0);
          gl.clear(gl.COLOR_BUFFER_BIT);
        }

        function ensureTargets(width, height) {
          if (local.targetWidth === width && local.targetHeight === height && local.targets.length === 2) {
            return;
          }

          local.targets.forEach(destroyTarget);
          local.targets = [createTarget(width, height), createTarget(width, height)];
          local.targetWidth = width;
          local.targetHeight = height;
          clearTarget(local.targets[0]);
          clearTarget(local.targets[1]);
          gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        }

        function resize(width, height) {
          if (engineCanvas.width !== width || engineCanvas.height !== height) {
            engineCanvas.width = width;
            engineCanvas.height = height;
          }
          gl.viewport(0, 0, width, height);
          ensureTargets(width, height);
        }

        function drawScene(inputTexture, target, now, passIndex) {
          gl.useProgram(sceneProgram);
          gl.bindFramebuffer(gl.FRAMEBUFFER, target.framebuffer);
          gl.viewport(0, 0, target.width, target.height);
          gl.uniform2f(sceneUni.resolution, target.width, target.height);
          gl.uniform1f(sceneUni.time, now);
          gl.uniform1f(sceneUni.pass, passIndex);
          gl.uniform1i(sceneUni.complexity, config.complexity);
          gl.uniform1f(sceneUni.speed, config.speed);
          gl.uniform1f(sceneUni.seed, local.seed);
          gl.activeTexture(gl.TEXTURE0);
          gl.bindTexture(gl.TEXTURE_2D, inputTexture);
          gl.uniform1i(sceneUni.prev, 0);
          gl.drawArrays(gl.TRIANGLES, 0, 3);
        }

        function drawPresent(inputTexture, now) {
          gl.useProgram(presentProgram);
          gl.bindFramebuffer(gl.FRAMEBUFFER, null);
          gl.viewport(0, 0, engineCanvas.width, engineCanvas.height);
          gl.uniform2f(presentUni.resolution, engineCanvas.width, engineCanvas.height);
          gl.uniform1f(presentUni.time, now);
          gl.activeTexture(gl.TEXTURE0);
          gl.bindTexture(gl.TEXTURE_2D, inputTexture);
          gl.uniform1i(presentUni.texture, 0);
          gl.drawArrays(gl.TRIANGLES, 0, 3);
        }

        function render(now, passCount) {
          if (local.targets.length < 2) {
            return;
          }

          let sourceTexture = local.targets[1].texture;
          const effectivePasses = Math.max(1, passCount);
          for (let i = 0; i < effectivePasses; i++) {
            const target = local.targets[i % 2];
            drawScene(sourceTexture, target, now + engineIndex * 7.5, i);
            sourceTexture = target.texture;
          }
          drawPresent(sourceTexture, now + engineIndex * 7.5);
        }

        function dispose() {
          local.targets.forEach(destroyTarget);
          local.targets = [];
          gl.deleteBuffer(buffer);
          gl.deleteProgram(sceneProgram);
          gl.deleteProgram(presentProgram);
        }

        return {
          gl,
          canvas: engineCanvas,
          resize,
          render,
          dispose
        };
      }

      const renderers = [];

      function rebuildEngines() {
        while (renderers.length) {
          const renderer = renderers.pop();
          renderer.dispose();
        }
        auxHost.textContent = '';

        const count = config.engineCount;
        try {
          for (let i = 0; i < count; i++) {
            const engineCanvas = makeHiddenCanvas();
            const renderer = createEngine(engineCanvas, i);
            if (!renderer) {
              setStatus('notSupported');
              setRenderState('unavailable');
              toggleBtn.disabled = true;
              return;
            }
            renderers.push(renderer);
          }
        } catch (err) {
          setStatus('compileFailed', err.message);
          setRenderState('error');
          toggleBtn.disabled = true;
          return;
        }

        state.currentEngineCount = config.engineCount;
        resizeEngines();
      }

      function resizeEngines() {
        config.dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
        const cssWidth = canvas.clientWidth || window.innerWidth;
        const cssHeight = canvas.clientHeight || window.innerHeight;
        const width = Math.max(2, Math.floor(cssWidth * config.dpr * config.resScale));
        const height = Math.max(2, Math.floor(cssHeight * config.dpr * config.resScale));
        if (stageRenderer) {
          stageRenderer.resize(width, height);
        }
        if (!renderers.length) {
          internalSizeEl.textContent = width + ' × ' + height;
          return;
        }
        for (const renderer of renderers) {
          renderer.resize(width, height);
        }
        internalSizeEl.textContent = width + ' × ' + height;
      }

      function applyPreset(name) {
        const presets = {
          safe: { res: 0.80, comp: 64, pass: 1, engines: 1, speed: 0.90 },
          medium: { res: 1.10, comp: 96, pass: 2, engines: 1, speed: 1.00 },
          extreme: { res: 1.50, comp: 160, pass: 4, engines: 2, speed: 1.20 },
          ultra: { res: 1.80, comp: 192, pass: 6, engines: 2, speed: 1.35 }
        };
        const presetConfig = presets[name] || presets.safe;
        resolution.value = String(presetConfig.res);
        complexity.value = String(presetConfig.comp);
        passes.value = String(presetConfig.pass);
        engines.value = String(presetConfig.engines);
        speed.value = String(presetConfig.speed);
        syncControls();
      }

      function syncControls() {
        config.resScale = Number(resolution.value);
        config.complexity = Number(complexity.value);
        config.passes = Number(passes.value);
        config.engineCount = Number(engines.value);
        config.speed = Number(speed.value);

        updateLabels();

        if (config.engineCount !== state.currentEngineCount) {
          rebuildEngines();
        } else {
          resizeEngines();
        }

        if (!state.running) {
          setStatus('updated', config.engineCount);
        } else {
          setStatus('running', config.engineCount);
        }
      }

      function slicePasses() {
        return Math.max(1, Math.ceil(config.passes / Math.max(1, renderers.length)));
      }

      function stopBatches() {
        state.batchToken += 1;
        if (state.batchTimer) {
          clearTimeout(state.batchTimer);
        }
        state.batchTimer = 0;
        state.batchActive = false;
        state.batchIndex = 0;
      }

      function beginBatch(now) {
        if (!state.running || state.batchActive || !renderers.length) {
          return;
        }

        state.batchActive = true;
        state.batchToken += 1;
        state.batchIndex = 0;
        state.batchNow = now;
        state.batchStart = performance.now();
        processBatch(state.batchToken);
      }

      function processBatch(token) {
        if (!state.running || token !== state.batchToken) {
          state.batchActive = false;
          return;
        }

        const renderer = renderers[state.batchIndex];
        if (!renderer) {
          completeBatch(token);
          return;
        }

        state.batchTimer = 0;
        renderer.render(state.batchNow, slicePasses());
        state.batchIndex += 1;

        if (!state.running || token !== state.batchToken) {
          state.batchActive = false;
          return;
        }

        state.batchTimer = window.setTimeout(() => processBatch(token), 0);
      }

      function completeBatch(token) {
        if (!state.running || token !== state.batchToken) {
          state.batchActive = false;
          return;
        }

        const duration = performance.now() - state.batchStart;
        state.smoothMs = state.smoothMs ? state.smoothMs * 0.9 + duration * 0.1 : duration;
        state.frameCount += 1;

        const now = performance.now();
        if (now - state.fpsLast >= 500) {
          state.fps = state.frameCount * 1000 / (now - state.fpsLast);
          state.frameCount = 0;
          state.fpsLast = now;

          fpsEl.textContent = state.fps.toFixed(0);
          frameMsEl.textContent = state.smoothMs.toFixed(1) + ' ms';
          setRenderState(state.running ? 'running' : 'paused');
          const loadHint = state.smoothMs > 0 ? Math.min(999, Math.round((state.smoothMs / 16.67) * 100)) : 0;
          setStatus('load', loadHint, config.engineCount, config.complexity, config.passes);
        }

        state.batchActive = false;
      }

      function drawIdle() {
        resizeEngines();
        const now = performance.now();
        if (stageRenderer) {
          stageRenderer.render(now);
        }
      }

      function setRunning(next) {
        state.running = next;
        updateToggleButton();
        setRenderState(next ? 'running' : 'paused');
        setStatus(next ? 'running' : 'paused', config.engineCount);
        if (next && !state.raf) {
          state.lastFrame = performance.now();
          state.fpsLast = state.lastFrame;
          state.raf = requestAnimationFrame(frame);
        }
        if (!next) {
          if (state.raf) {
            cancelAnimationFrame(state.raf);
          }
          state.raf = 0;
          stopBatches();
        }
      }

      function frame(now) {
        if (!state.running) {
          state.raf = 0;
          return;
        }

        resizeEngines();
        if (stageRenderer) {
          stageRenderer.render(now);
        }
        if (!state.batchActive) {
          beginBatch(now);
        }

        state.raf = requestAnimationFrame(frame);
      }

      toggleBtn.addEventListener('click', () => {
        setRunning(!state.running);
      });

      preset.addEventListener('change', () => applyPreset(preset.value));
      resolution.addEventListener('input', syncControls);
      complexity.addEventListener('input', syncControls);
      passes.addEventListener('input', syncControls);
      engines.addEventListener('input', syncControls);
      speed.addEventListener('input', syncControls);

      window.addEventListener('resize', () => {
        config.dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
        resizeEngines();
        if (!state.running) {
          drawIdle();
        }
      });

      document.addEventListener('visibilitychange', () => {
        if (document.hidden && state.running) {
          setStatus('background');
        }
      });

      langSelect.addEventListener('change', () => {
        setLanguage(langSelect.value);
      });

      applyPreset('safe');
      setLanguage(langSelect.value);
      drawIdle();
      fpsEl.textContent = '0';
      frameMsEl.textContent = '0.0 ms';
      setRenderState('standby');
      setStatus('ready');
    })();
  </script>
</body>
</html>
